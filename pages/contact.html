<!DOCTYPE html>
<html lang="uk">
<head>
    <link rel="stylesheet" href="assets/style.css">

<link rel="stylesheet" href="../assets/style.css">
    <meta charset="UTF-8">
    <title>Контакти</title>
</head>
<body>
    <header>
        <nav>
            <a href="../index.html">Головна</a> |
            <a href="about.html">Про мене</a> |
            <a href="contact.html">Контакти</a>
        </nav>
    </header>
    <main>
        <h1>Зворотний зв’язок</h1>
        <form action="#" method="get">
            <p>
                <label for="name">Ім'я:</label>
                <input type="text" id="name" name="name" required minlength="2">
            </p>
            <p>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </p>
            <fieldset>
                <legend>Спосіб зв'язку</legend>
                <label><input type="radio" name="contact" value="email" checked> Email</label>
                <label><input type="radio" name="contact" value="phone"> Телефон</label>
            </fieldset>
            <p>
                <label for="message">Повідомлення:</label><br>
                <textarea id="message" name="message" rows="4"></textarea>
            </p>
            <p>
                <label>
                    <input type="checkbox" name="agree" required> Я згоден з правилами
                </label>
            </p>
            <button type="submit">Надіслати</button>
        </form>
    </main>
</body>
</html>
